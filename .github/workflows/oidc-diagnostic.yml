name: OIDC identity diagnostic

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    name: Log non-secret OIDC identity claims
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Request and decode the npm-audience OIDC token
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const requestUrl = process.env.ACTIONS_ID_TOKEN_REQUEST_URL;
          const requestToken = process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;
          if (!requestUrl || !requestToken) {
            throw new Error("GitHub did not provide OIDC request credentials");
          }

          const url = new URL(requestUrl);
          url.searchParams.set("audience", "npm:registry.npmjs.org");
          const response = await fetch(url, {
            headers: {
              Accept: "application/json",
              Authorization: `Bearer ${requestToken}`,
            },
          });
          if (!response.ok) {
            throw new Error(`OIDC token request failed with HTTP ${response.status}`);
          }

          const body = await response.json();
          if (typeof body.value !== "string") {
            throw new Error("OIDC token response did not contain a JWT");
          }
          const segments = body.value.split(".");
          if (segments.length !== 3 || !segments[1]) {
            throw new Error("OIDC token was not a three-segment JWT");
          }
          const payload = JSON.parse(Buffer.from(segments[1], "base64url").toString("utf8"));
          const claimNames = [
            "aud",
            "sub",
            "repository",
            "repository_owner",
            "repository_visibility",
            "workflow",
            "workflow_ref",
            "job_workflow_ref",
            "ref",
            "ref_type",
            "environment",
            "event_name",
            "runner_environment",
          ];
          const visibleClaims = Object.fromEntries(
            claimNames
              .filter((name) => Object.hasOwn(payload, name))
              .map((name) => [name, payload[name]]),
          );
          console.log(JSON.stringify({ oidc_identity_claims: visibleClaims }, null, 2));
          NODE
