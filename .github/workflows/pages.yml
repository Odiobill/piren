name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling runs in progress.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # enablement: true auto-enables GitHub Pages on the repository and
          # sets the source to "GitHub Actions" if it is not already enabled.
          # This makes the workflow self-contained: no manual Settings toggle.
          enablement: true
      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The landing page lives under site/. Actions-deploy mode (Settings >
          # Pages > Source = "GitHub Actions") can publish from any path, so we
          # do not need to move it into docs/ or the branch root.
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
