# Deploy the public landing page (site/) to GitHub Pages.
#
# One-time setup (GitHub gates site creation behind repo admin access, so the
# default GITHUB_TOKEN cannot do it from a workflow):
#   1. Repository Settings > Pages > "Build and deployment" > Source
#   2. Select "GitHub Actions"
# After that one toggle, this workflow publishes automatically on every push
# to main that touches site/ or this workflow file.
#
# Why Actions-deploy, not branch-deploy: the "Deploy from a branch" mode only
# serves the branch root or /docs. site/ cannot be a source there, so we use
# Actions-deploy, which can publish any path.
name: Deploy landing page

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling runs in progress.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # The landing page lives under site/. Actions-deploy mode (Settings >
          # Pages > Source = "GitHub Actions") can publish from any path, so we
          # do not need to move it into docs/ or the branch root.
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
