# Registry publication workflow (ADR-0033 P1).
#
# This is the ONLY workflow that publishes Piren to npm. It is deliberately
# distinct from release-verify.yml (which stays verification-only) and never
# weakens or repurposes it.
#
# It is split into two jobs so steward approval happens AFTER artifact
# verification, not before:
#   - verify: unprotected, only contents: read. Checks out the tag, runs the
#     four quality gates, checks tag/package version agreement, builds ONE
#     explicit tarball, validates + installs that exact tarball through the
#     existing clean-install machinery (CI-only fake pi shim), then uploads it
#     as a workflow artifact.
#   - publish: needs verify, gated by the protected npm-production GitHub
#     Environment (steward approval). It downloads the verified tarball artifact
#     and publishes that artifact with provenance to the stable latest dist-tag.
#     It never rebuilds, repacks, or uses branch-tip/github source.
#   - diagnose_oidc_exchange: manual-only, also gated by npm-production, and
#     exchanges an npm-audience GitHub ID token under this workflow filename.
#     It never publishes, installs npm packages, or logs a token.
#
# Hard boundaries (intentional):
#   - Publishes ONLY from a release tag (v*), after tag/package version
#     agreement. It uses no npm access token, no registry secret, and no
#     .npmrc secret anywhere; auth is OIDC trusted publishing (configured in P2).
#   - id-token: write is granted only to publish after verify, or to the
#     manual-only non-publishing OIDC exchange diagnostic after approval.
#   - Does not bundle or install Pi; the fake pi shim is CI-only and unshipped.
name: Release publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Default minimal permissions for every job. The publish job widens to
# id-token: write only after verify succeeds; the manual diagnostic does so
# only after its own npm-production approval.
permissions:
  contents: read

jobs:
  verify:
    name: Verify release artifact
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tag source
        uses: actions/checkout@v4

      - name: Setup Node 22.14.0 (trusted-publishing floor) with npm lockfile cache
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "npm"

      - name: Install dependencies from the repository lockfile
        run: npm ci

      - name: Quality gate - unit tests
        run: npm test

      - name: Quality gate - typecheck
        run: npm run typecheck

      - name: Quality gate - build
        run: npm run build

      # Narrowly scoped CI-only fake pi (same approach as release-verify.yml).
      # Piren's policy requires a `pi` command on PATH; smoke (buildPiRunCommand)
      # and the clean-install check both need it. Installed AFTER unit tests (so
      # unit tests stay hermetic with no runner Pi) and BEFORE smoke + packed-
      # tarball verification. NOT shipped with Piren.
      - name: Provide CI-only fake pi on PATH (release verification only)
        run: |
          set -euo pipefail
          dir="$RUNNER_TEMP/fake-pi"
          mkdir -p "$dir"
          cat > "$dir/pi" <<'SHIM'
          #!/usr/bin/env bash
          # CI-only fake pi shim for release publication. NOT shipped with Piren.
          case "${1:-}" in
            --version)
              echo "0.0.0-piren-ci-shim"
              ;;
            *)
              echo "fake pi shim for piren release verification"
              ;;
          esac
          exit 0
          SHIM
          chmod +x "$dir/pi"
          echo "$dir" >> "$GITHUB_PATH"

      - name: Quality gate - smoke
        run: npm run smoke

      # Fail before any publish if the tag and package.json versions disagree.
      # GITHUB_REF_NAME is the tag (e.g. v0.1.1); strip the leading "v".
      - name: Check tag and package version agreement
        run: |
          set -euo pipefail
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"
          echo "package version: $pkg_version"
          echo "tag version: $tag_version"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "Version mismatch: package.json is $pkg_version but tag is $tag_version. Aborting before publish."
            exit 1
          fi

      # One explicit npm tarball. `npm pack` runs `prepack` (npm run build) so
      # the tarball carries freshly built dist/. This file is the single
      # artifact that is validated, installed, uploaded, and published.
      - name: Build the npm tarball (one explicit artifact)
        run: npm pack

      # Validate + install THAT EXACT packed tarball through the existing
      # clean-install machinery: packed surface (dist + docs) then an isolated
      # clean HOME/prefix install with the dist/binary/Pi-runtime probes.
      - name: Validate and clean-install the packed tarball
        run: |
          set -euo pipefail
          tarball="$(ls -1 odiobill-piren-*.tgz | head -n 1)"
          echo "Verifying packed tarball: $tarball"
          npm run clean-install:check -- "$tarball"

      # Hand the verified tarball to the publish job as a workflow artifact so
      # publish never rebuilds or repacks.
      - name: Upload the verified tarball
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: odiobill-piren-*.tgz
          if-no-files-found: error

  publish:
    name: Publish verified release to npm
    runs-on: ubuntu-latest
    needs: verify
    # Three narrowly bounded manual-bootstrap exceptions (ADR-0035 + ADR-0036 +
    # ADR-0037):
    #   - v0.1.1: tagged candidate whose release verification FAILED before
    #     registry publication; permanently unpublished.
    #   - v0.1.2: exact tarball rejected by npm (unscoped `piren` too similar to
    #     `porek`) before publication; permanently unpublished.
    #   - v0.1.3: the sole scoped (@odiobill/piren) one-time manual bootstrap.
    # Skip the publish job for exactly those three tags so the workflow still
    # verifies the artifact (verify runs) but never attempts an npm publish for
    # any of them. v0.1.4 and later use the normal provenance path below.
    if: github.event_name == 'push' && github.ref_name != 'v0.1.1' && github.ref_name != 'v0.1.2' && github.ref_name != 'v0.1.3'
    # Protected GitHub Environment: a steward approves this job in GitHub before
    # it runs. Because publish needs verify, approval happens AFTER the
    # tag-triggered verification path has completed. Configured in P2.
    environment: npm-production
    # id-token: write is granted ONLY here, after verify + approval, for npm
    # provenance via OIDC trusted publishing. No token secret is used.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup Node 22.14.0 (trusted-publishing floor)
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"

      # npm trusted publishing requires npm CLI >=11.5.1. Node 22.14.0 bundles an
      # older npm, and jobs are isolated (verify's npm is not shared here), so
      # publish installs the required npm itself. No token, registry-url, or
      # .npmrc is involved; this is a toolchain self-upgrade, not a package
      # dependency. verify needs only the Node floor (its ci/pack/clean-install
      # run on the bundled npm), so npm is not standardized across both jobs.
      - name: Install npm CLI >=11.5.1 (trusted publishing)
        run: npm install -g npm@11.5.1

      # Fail-closed toolchain preflight: report versions and abort before the
      # provenance publish if either Node or npm is below the official floor.
      - name: Trusted-publishing toolchain preflight (Node >=22.14.0, npm >=11.5.1)
        run: |
          set -euo pipefail
          node -e 'const cp=require("child_process");const P=s=>s.split(".").map(n=>parseInt(n,10)||0);const G=(a,b)=>{const x=P(a),y=P(b);for(let i=0;i<3;i++){if((x[i]||0)>(y[i]||0))return 1;if((x[i]||0)<(y[i]||0))return -1;}return 0;};const nv=process.versions.node;const mv=cp.execSync("npm -v").toString().trim();console.log("node "+nv);console.log("npm "+mv);let ok=true;if(G(nv,"22.14.0")<0){console.error("FAIL: node "+nv+" is below the trusted-publishing floor 22.14.0");ok=false;}if(G(mv,"11.5.1")<0){console.error("FAIL: npm "+mv+" is below the trusted-publishing floor 11.5.1");ok=false;}if(!ok)process.exit(1);'

      - name: Download the verified tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball

      # Publish ONLY the downloaded verified artifact, with npm provenance
      # (OIDC), to the stable latest dist-tag. No rebuild, no repack, no
      # branch-tip/github source. `--access public` and `--tag latest` explicit.
      - name: Publish the verified tarball to npm latest with provenance
        run: |
          set -euo pipefail
          tarball="$(ls -1 odiobill-piren-*.tgz | head -n 1)"
          echo "Publishing verified tarball: $tarball"
          npm publish "$tarball" --provenance --access public --tag latest

  diagnose_oidc_exchange:
    name: Diagnose npm OIDC exchange without publishing
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Exchange the npm-audience OIDC token without exposing it
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const requestUrl = process.env.ACTIONS_ID_TOKEN_REQUEST_URL;
          const requestToken = process.env.ACTIONS_ID_TOKEN_REQUEST_TOKEN;
          if (!requestUrl || !requestToken) {
            throw new Error("GitHub did not provide OIDC request credentials");
          }

          const oidcUrl = new URL(requestUrl);
          oidcUrl.searchParams.set("audience", "npm:registry.npmjs.org");
          const oidcResponse = await fetch(oidcUrl, {
            headers: {
              Accept: "application/json",
              Authorization: `Bearer ${requestToken}`,
            },
          });
          if (!oidcResponse.ok) {
            throw new Error(`OIDC token request failed with HTTP ${oidcResponse.status}`);
          }
          const oidcBody = await oidcResponse.json();
          if (typeof oidcBody.value !== "string") {
            throw new Error("OIDC token response did not contain a JWT");
          }

          const exchangeResponse = await fetch(
            "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/@odiobill%2fpiren",
            {
              method: "POST",
              headers: {
                Accept: "application/json",
                Authorization: `Bearer ${oidcBody.value}`,
              },
            },
          );
          console.log(JSON.stringify({
            package: "@odiobill/piren",
            oidc_exchange_status: exchangeResponse.status,
            accepted: exchangeResponse.ok,
          }, null, 2));
          if (!exchangeResponse.ok) {
            process.exitCode = 1;
          }
          NODE
